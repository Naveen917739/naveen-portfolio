<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Naveen Nimmala Portfolio</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-body">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-n">N</span>
        <span class="login-logo-text">Admin Panel</span>
      </div>
      <h1>Welcome Back</h1>
      <p class="login-sub">Sign in to manage your leads and inquiries.</p>

      {% if error %}
      <div class="login-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Username" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fas fa-lock"></i> Sign In
        </button>
      </form>

      <a href="{{ url_for('index') }}" class="login-back"><i class="fas fa-arrow-left"></i> Back to website</a>
    </div>
  </div>

</body>
</html>
